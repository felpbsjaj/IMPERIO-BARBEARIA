<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Império · Funcionários</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0c0c0e;--bg2:#101012;--surface:#15151a;--surface2:#1a1a20;--surface3:#202028;
  --border:rgba(255,255,255,0.055);--border2:rgba(255,255,255,0.09);
  --gold:#c8a84b;--gold2:#dfc06e;--golddim:rgba(200,168,75,0.1);--golddim2:rgba(200,168,75,0.06);
  --text:#eeeae0;--text2:#9b9690;--text3:#4e4c48;
  --green:#4dbe78;--greendim:rgba(77,190,120,0.1);
  --red:#e05252;--reddim:rgba(224,82,82,0.1);
  --blue:#5b8dee;--bluedim:rgba(91,141,238,0.1);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;overflow-x:hidden;}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px;}
#loading h1{font-family:'Syne',sans-serif;font-weight:800;font-size:40px;letter-spacing:5px;color:var(--gold);}
#loading p{color:var(--text3);font-size:12.5px;}
.spinner{width:26px;height:26px;border:2px solid var(--surface3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* AUTH */
#auth-screen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:24px;flex-direction:column;gap:26px;}
.auth-logo h1{font-family:'Syne',sans-serif;font-weight:800;font-size:44px;letter-spacing:6px;color:var(--gold);text-align:center;}
.auth-logo p{color:var(--text3);font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;text-align:center;margin-top:3px;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:26px;width:100%;max-width:350px;display:flex;flex-direction:column;gap:13px;}
.auth-card h2{font-family:'Syne',sans-serif;font-weight:700;font-size:19px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}
.input-f{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px 13px;color:var(--text);font-family:inherit;font-size:14px;outline:none;width:100%;transition:border-color .15s;}
.input-f:focus{border-color:var(--gold);}
.btn-gold{background:var(--gold);color:#0c0c0e;border:none;border-radius:8px;padding:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;cursor:pointer;width:100%;transition:all .15s;}
.btn-gold:hover{background:var(--gold2);}
.auth-error{color:var(--red);font-size:11.5px;text-align:center;display:none;}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh;}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-left{display:flex;flex-direction:column;}
.header-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:3px;color:var(--gold);line-height:1;}
.header-sede{font-size:10.5px;color:var(--text3);margin-top:1px;letter-spacing:.5px;}
.header-right{display:flex;align-items:center;gap:10px;}
.header-nome{font-size:12.5px;color:var(--text2);}
.btn-icon{background:transparent;border:1px solid var(--border);border-radius:7px;padding:7px;color:var(--text3);cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s;display:flex;align-items:center;}
.btn-icon:hover{border-color:var(--gold);color:var(--gold);}

/* DAY SUMMARY */
.day-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;gap:20px;overflow-x:auto;scrollbar-width:none;}
.day-bar::-webkit-scrollbar{display:none;}
.day-stat{display:flex;flex-direction:column;gap:2px;min-width:fit-content;}
.day-stat-label{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}
.day-stat-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;line-height:1;}
.day-stat-val.gold{color:var(--gold);}
.day-stat-val.green{color:var(--green);}
.day-stat-val.red{color:var(--red);}

/* NAV */
.nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;}
.nav-tab{flex:1;padding:12px 8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;text-align:center;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.nav-tab i{width:14px;height:14px;}

/* CONTENT */
.content{flex:1;padding:16px;max-width:580px;margin:0 auto;width:100%;}
.tab-page{display:none;}
.tab-page.active{display:block;animation:fadeUp .25s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* SERVIÇOS */
.page-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:11px;display:block;}
.srv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
@media(min-width:380px){.srv-grid{grid-template-columns:repeat(3,1fr);}}
.srv-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 11px;cursor:pointer;text-align:center;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:5px;user-select:none;}
.srv-btn:hover,.srv-btn:active{border-color:var(--gold);background:var(--golddim);transform:translateY(-1px);}
.srv-btn:active{transform:scale(.96);}
.srv-nome{font-size:12px;font-weight:500;line-height:1.3;color:var(--text);}
.srv-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--gold);}

/* HIST */
.hist-list{display:flex;flex-direction:column;gap:6px;}
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:border-color .15s;}
.hist-item:hover{border-color:var(--border2);}
.hist-srv{font-size:13px;font-weight:500;}
.hist-meta{font-size:10.5px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.hist-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--green);white-space:nowrap;}
.hist-val.disc{color:var(--gold2);}
.hist-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.btn-del{background:var(--reddim);color:var(--red);border:1px solid rgba(224,82,82,.18);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:3px;}

/* TAGS */
.tag{font-size:10px;padding:2px 6px;border-radius:5px;font-weight:600;white-space:nowrap;}
.tag-pix{background:var(--greendim);color:var(--green);}
.tag-din{background:var(--golddim);color:var(--gold2);}
.tag-cred{background:var(--bluedim);color:var(--blue);}
.tag-deb{background:rgba(91,141,238,.07);color:#7aabf0;}
.tag-pago{background:rgba(77,190,120,.1);color:var(--green);border:1px solid rgba(77,190,120,.18);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;animation:fadeIn .17s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:18px 18px 0 0;width:100%;max-width:480px;padding:26px 22px 40px;display:flex;flex-direction:column;gap:16px;max-height:92vh;overflow-y:auto;animation:slideUp .24s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:-10px auto 0;}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;}
.modal-preview{background:var(--golddim2);border:1px solid rgba(200,168,75,.1);border-radius:10px;padding:16px;text-align:center;}
.mp-name{font-size:11.5px;color:var(--text3);margin-bottom:3px;}
.mp-val{font-family:'Syne',sans-serif;font-size:34px;font-weight:700;color:var(--gold2);}
.modal-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.3px;margin-bottom:7px;}
.pgto-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.pgto-btn{background:var(--surface2);border:2px solid var(--border);border-radius:9px;padding:12px 10px;cursor:pointer;text-align:center;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;font-family:inherit;}
.pgto-btn:hover{border-color:var(--border2);color:var(--text);}
.pgto-btn.sel{border-color:var(--gold);background:var(--golddim);color:var(--gold2);}
.desc-toggle{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:border-color .15s;}
.desc-toggle:hover{border-color:var(--border2);}
.desc-toggle-text{font-size:13px;color:var(--text2);}
.desc-body{display:none;flex-direction:column;gap:9px;}
.desc-body.open{display:flex;}
.desc-type{display:flex;gap:6px;}
.desc-type-btn{flex:1;padding:8px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s;}
.desc-type-btn.active{border-color:var(--gold);color:var(--gold);background:var(--golddim);}
.input-num{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px 13px;color:var(--text);font-family:inherit;font-size:15px;outline:none;width:100%;transition:border-color .15s;-moz-appearance:textfield;}
.input-num::-webkit-outer-spin-button,.input-num::-webkit-inner-spin-button{-webkit-appearance:none;}
.input-num:focus{border-color:var(--gold);}
.vf-row{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--bg2);border-radius:9px;border:1px solid var(--border);}
.vf-label{font-size:12px;color:var(--text3);}
.vf-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;color:var(--green);}
.btn-registrar{background:var(--gold);color:#0c0c0e;border:none;border-radius:9px;padding:15px;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;letter-spacing:.5px;cursor:pointer;width:100%;transition:all .15s;}
.btn-registrar:hover{background:var(--gold2);}
.btn-registrar:active{transform:scale(.98);}
.btn-registrar:disabled{background:var(--surface3);color:var(--text3);cursor:not-allowed;}
.btn-cancel{background:none;border:1px solid var(--border);border-radius:9px;padding:12px;color:var(--text3);cursor:pointer;font-family:inherit;font-size:13px;width:100%;transition:all .15s;}
.btn-cancel:hover{border-color:var(--border2);color:var(--text2);}

/* EMPTY / TOAST */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}
.empty-ico{font-size:36px;margin-bottom:10px;opacity:.18;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);border:1px solid rgba(200,168,75,.28);border-radius:22px;padding:9px 20px;font-size:12.5px;color:var(--gold);z-index:9999;transition:transform .26s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
*{scrollbar-width:thin;scrollbar-color:var(--surface3) transparent;}
*::-webkit-scrollbar{width:4px;}
*::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
</style>
</head>
<body>

<div id="loading"><h1>IMPÉRIO</h1><div class="spinner"></div><p>Carregando...</p></div>

<div id="auth-screen">
  <div class="auth-logo"><h1>IMPÉRIO</h1><p>Área dos Funcionários</p></div>
  <div class="auth-card">
    <h2>Entrar</h2>
    <div class="field"><label>E-mail</label><input class="input-f" type="email" id="auth-email" placeholder="seu@email.com" autocomplete="email"></div>
    <div class="field"><label>Senha</label><input class="input-f" type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <p class="auth-error" id="auth-error"></p>
    <button class="btn-gold" onclick="doLogin()">ENTRAR</button>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <span class="header-logo">IMPÉRIO</span>
      <span class="header-sede" id="header-sede">—</span>
    </div>
    <div class="header-right">
      <span class="header-nome" id="header-nome">—</span>
      <button class="btn-icon" onclick="doLogout()" title="Sair"><i data-lucide="log-out" style="width:15px;height:15px"></i></button>
    </div>
  </div>

  <div class="day-bar">
    <div class="day-stat"><span class="day-stat-label">Total bruto</span><span class="day-stat-val gold" id="ds-bruto">R$ 0</span></div>
    <div class="day-stat"><span class="day-stat-label">Seu valor</span><span class="day-stat-val green" id="ds-liq">R$ 0</span></div>
    <div class="day-stat"><span class="day-stat-label">Serviços</span><span class="day-stat-val" id="ds-qt">0</span></div>
    <div class="day-stat"><span class="day-stat-label">Descontos</span><span class="day-stat-val red" id="ds-desc">R$ 0</span></div>
  </div>

  <div class="nav">
    <div class="nav-tab active" data-tab="tab-reg"><i data-lucide="scissors"></i>Registrar</div>
    <div class="nav-tab" data-tab="tab-hist"><i data-lucide="clock"></i>Histórico</div>
  </div>

  <div class="content">
    <div id="tab-reg" class="tab-page active">
      <span class="page-label">Toque no serviço realizado</span>
      <div class="srv-grid" id="srv-grid"></div>
    </div>
    <div id="tab-hist" class="tab-page">
      <span class="page-label">Serviços de hoje</span>
      <div class="hist-list" id="hist-list"><div class="empty"><div class="empty-ico">✂️</div>Nenhum serviço hoje</div></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-reg">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Registrar Serviço</div>
    <div class="modal-preview"><div class="mp-name" id="reg-nome">—</div><div class="mp-val" id="reg-val">R$ 0</div></div>
    <div><div class="modal-label">Forma de Pagamento</div>
      <div class="pgto-grid">
        <button class="pgto-btn" onclick="selPgto('Pix',this)">💚 Pix</button>
        <button class="pgto-btn" onclick="selPgto('Dinheiro',this)">💵 Dinheiro</button>
        <button class="pgto-btn" onclick="selPgto('Crédito',this)">💳 Crédito</button>
        <button class="pgto-btn" onclick="selPgto('Débito',this)">🏦 Débito</button>
      </div>
    </div>
    <div>
      <div class="desc-toggle" onclick="toggleDesc()">
        <span class="desc-toggle-text">🏷️ Desconto (opcional)</span>
        <i data-lucide="plus" id="desc-ico" style="width:15px;height:15px;color:var(--text3);transition:transform .2s"></i>
      </div>
      <div class="desc-body" id="desc-body">
        <div class="desc-type">
          <button class="desc-type-btn active" id="btn-reais" onclick="setDescTipo('reais')">R$ Reais</button>
          <button class="desc-type-btn" id="btn-pct" onclick="setDescTipo('pct')">% Porcentagem</button>
        </div>
        <input type="number" class="input-num" id="desc-val" placeholder="0" min="0" oninput="updFinal()">
      </div>
    </div>
    <div class="vf-row"><span class="vf-label">Valor Final</span><span class="vf-val" id="vf-val">R$ 0</span></div>
    <button class="btn-registrar" id="btn-confirm" onclick="confirmar()" disabled>REGISTRAR</button>
    <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, getDoc, getDocs, deleteDoc, query, where, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA7ISbwf_RCg_3IRTOboeV1Y9W4_wf8HY4",authDomain:"barb-imperio.firebaseapp.com",projectId:"barb-imperio",storageBucket:"barb-imperio.firebasestorage.app",messagingSenderId:"1011188015253",appId:"1:1011188015253:web:bc824812e8ac6628017b9c"};
const fbApp=initializeApp(firebaseConfig);
const auth=getAuth(fbApp),db=getFirestore(fbApp);
let cu=null,ud=null,servicos=[],selSrv=null,selPgtoVal=null,descOpen=false,descTipoVal='reais';
const hoje=()=>new Date().toISOString().split('T')[0];
const fmt=v=>`R$ ${parseFloat(v).toFixed(2).replace('.',',')}`;
const toast=msg=>{const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);};
const icons=()=>{if(window.lucide)lucide.createIcons();};
window.fecharModal=()=>document.getElementById('modal-reg').classList.remove('open');

onAuthStateChanged(auth,async user=>{
  if(!user){showAuth();return;}
  const snap=await getDoc(doc(db,'usuarios',user.uid));
  if(!snap.exists()){await signOut(auth);showAuth();return;}
  const data=snap.data();
  if(data.role==='admin'){await signOut(auth);document.getElementById('loading').style.display='none';document.getElementById('auth-screen').style.display='flex';document.getElementById('auth-error').textContent='Use o painel admin para sua conta.';document.getElementById('auth-error').style.display='block';return;}
  cu=user;ud=data;initApp();
});

function showAuth(){document.getElementById('loading').style.display='none';document.getElementById('auth-screen').style.display='flex';document.getElementById('app').style.display='none';}

async function initApp(){
  document.getElementById('loading').style.display='none';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('header-nome').textContent=ud.nome||'';
  document.getElementById('header-sede').textContent=ud.sede||'';
  document.querySelectorAll('.nav-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab).classList.add('active');
      if(tab.dataset.tab==='tab-hist')carregarHistorico();
    });
  });
  await carregarServicos();
  carregarResumo();
  icons();
}

window.doLogin=async()=>{
  const email=document.getElementById('auth-email').value.trim(),pass=document.getElementById('auth-pass').value,err=document.getElementById('auth-error');
  err.style.display='none';
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){err.textContent='E-mail ou senha incorretos.';err.style.display='block';}
};
window.doLogout=()=>signOut(auth);

async function carregarServicos(){
  const snap=await getDocs(query(collection(db,'servicos'),orderBy('nome')));
  servicos=snap.docs.map(d=>({id:d.id,...d.data()}));
  const g=document.getElementById('srv-grid');
  if(!servicos.length){g.innerHTML='<p style="color:var(--text3);font-size:12px;grid-column:1/-1;padding:20px 0">Nenhum serviço cadastrado ainda.</p>';return;}
  g.innerHTML=servicos.map(s=>`<div class="srv-btn" onclick="abrirRegistro('${s.id}')"><span class="srv-nome">${s.nome}</span><span class="srv-val">R$ ${s.valor}</span></div>`).join('');
}

async function carregarResumo(){
  const q=query(collection(db,'registros'),where('barbeiroId','==',cu.uid),where('data','==',hoje()),orderBy('timestamp','desc'));
  const snap=await getDocs(q);
  const regs=snap.docs.map(d=>d.data());
  const bruto=regs.reduce((a,r)=>a+r.valorFinal,0);
  const pct=ud.porcentagem||0;
  document.getElementById('ds-bruto').textContent=fmt(bruto);
  document.getElementById('ds-liq').textContent=fmt(bruto*pct/100);
  document.getElementById('ds-qt').textContent=regs.length;
  document.getElementById('ds-desc').textContent=fmt(regs.reduce((a,r)=>a+(r.desconto||0),0));
}

async function carregarHistorico(){
  const q=query(collection(db,'registros'),where('barbeiroId','==',cu.uid),where('data','==',hoje()),orderBy('timestamp','desc'));
  const snap=await getDocs(q);
  const regs=snap.docs.map(d=>({id:d.id,...d.data()}));
  const el=document.getElementById('hist-list');
  if(!regs.length){el.innerHTML='<div class="empty"><div class="empty-ico">✂️</div>Nenhum serviço hoje</div>';return;}
  const tc={Pix:'tag-pix',Dinheiro:'tag-din','Crédito':'tag-cred','Débito':'tag-deb'};
  el.innerHTML=regs.map(r=>{
    const hora=r.timestamp?.toDate?r.timestamp.toDate().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'--:--';
    const td=r.desconto>0;
    return `<div class="hist-item"><div style="flex:1;min-width:0"><div class="hist-srv">${r.servicoNome}</div><div class="hist-meta">${hora} <span class="tag ${tc[r.pagamento]||''}">${r.pagamento}</span>${td?` <span style="color:var(--red);font-size:10px">-${fmt(r.desconto)}</span>`:''} <span class="tag tag-pago">Pago</span></div></div><div class="hist-right"><div class="hist-val ${td?'disc':''}">${fmt(r.valorFinal)}</div><button class="btn-del" onclick="deletarRegistro('${r.id}')"><i data-lucide="trash-2" style="width:11px;height:11px"></i></button></div></div>`;
  }).join('');
  icons();
}

window.deletarRegistro=async id=>{
  if(!confirm('Apagar este registro?'))return;
  await deleteDoc(doc(db,'registros',id));
  toast('🗑️ Registro apagado');carregarResumo();carregarHistorico();
};

window.abrirRegistro=id=>{
  selSrv=servicos.find(s=>s.id===id);if(!selSrv)return;
  selPgtoVal=null;descOpen=false;descTipoVal='reais';
  document.getElementById('reg-nome').textContent=selSrv.nome;
  document.getElementById('reg-val').textContent=`R$ ${selSrv.valor}`;
  document.getElementById('vf-val').textContent=`R$ ${selSrv.valor}`;
  document.getElementById('desc-val').value='';
  document.getElementById('desc-body').classList.remove('open');
  document.getElementById('desc-ico').style.transform='';
  document.getElementById('btn-confirm').disabled=true;
  document.querySelectorAll('.pgto-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('modal-reg').classList.add('open');icons();
};
window.selPgto=(p,el)=>{selPgtoVal=p;document.querySelectorAll('.pgto-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');document.getElementById('btn-confirm').disabled=false;};
window.toggleDesc=()=>{descOpen=!descOpen;document.getElementById('desc-body').classList.toggle('open',descOpen);document.getElementById('desc-ico').style.transform=descOpen?'rotate(45deg)':'';if(!descOpen){document.getElementById('desc-val').value='';updFinal();}};
window.setDescTipo=t=>{descTipoVal=t;document.getElementById('btn-reais').classList.toggle('active',t==='reais');document.getElementById('btn-pct').classList.toggle('active',t==='pct');updFinal();};
window.updFinal=()=>{if(!selSrv)return;const base=parseFloat(selSrv.valor)||0,inp=parseFloat(document.getElementById('desc-val').value)||0;let desc=0;if(descOpen&&inp>0)desc=Math.min(descTipoVal==='pct'?base*inp/100:inp,base);document.getElementById('vf-val').textContent=fmt(base-desc);};

window.confirmar=async()=>{
  if(!selSrv||!selPgtoVal)return;
  const base=parseFloat(selSrv.valor)||0,inp=parseFloat(document.getElementById('desc-val').value)||0;
  let desc=0;if(descOpen&&inp>0)desc=Math.min(descTipoVal==='pct'?base*inp/100:inp,base);
  const vf=parseFloat((base-desc).toFixed(2));
  await addDoc(collection(db,'registros'),{barbeiroId:cu.uid,barbeiroNome:ud.nome,sede:ud.sede||'Sem sede',servicoId:selSrv.id,servicoNome:selSrv.nome,valorTabela:base,desconto:desc,valorFinal:vf,pagamento:selPgtoVal,porcentagem:ud.porcentagem||0,isOwnerCut:false,timestamp:Timestamp.now(),data:hoje()});
  fecharModal();toast(`✅ ${selSrv.nome} · ${fmt(vf)}`);carregarResumo();
};

document.getElementById('modal-reg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-reg'))fecharModal();});
</script>
</body>
</html>
